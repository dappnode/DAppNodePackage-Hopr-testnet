name: Bump packages
on:
  repository_dispatch:
    types: [bump]
  workflow_dispatch:
    inputs:
      hoprd_version:
        description: 'Version of hoprd to build'
        required: false
      node_admin_version:
        description: 'Version of node-admin to build'
        required: false
jobs:
  bump:
    name: Bump docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose
      - name: Setup variables
        id: setup
        run: |
          default_hoprd_version=$(yq -r '.services.node.build.args.UPSTREAM_VERSION' docker-compose.yml)
          default_hoprd_version=$(echo $default_hoprd_version | cut -d@ -f1)
          hoprd_version="${HOPRD_VERSION:-$default_hoprd_version}"
          docker pull "${DOCKER_REGISTRY}/hoprd:${hoprd_version#v}"
          digest=$(docker inspect --format='{{index .RepoDigests 0}}' "${DOCKER_REGISTRY}/hoprd:${hoprd_version#v}" | cut -d@ -f2)
          echo "HOPRD_VERSION=${hoprd_version}@${digest}" | tee -a "${GITHUB_OUTPUT}"

          node_admin_image=$(yq -r '.services.admin.image' docker-compose.yml)
          default_node_admin_version=$(echo $node_admin_image | cut -d: -f2)
          echo "NODE_ADMIN_VERSION=${NODE_ADMIN_VERSION:-$default_node_admin_version}" | tee -a "${GITHUB_OUTPUT}"
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
          HOPRD_VERSION: ${{ github.event.inputs.hoprd_version || github.event.client_payload.hoprd_version }}
          NODE_ADMIN_VERSION: ${{ github.event.inputs.node_admin_version || github.event.client_payload.node_admin_version }}
      - name: Update docker-compose.yml
        run: |
          yq -i '.services.node.build.args.UPSTREAM_VERSION = strenv(HOPRD_VERSION)' docker-compose.yml
          yq -i '.services.admin.image = strenv(DOCKER_REGISTRY) + "/hopr-admin:" + strenv(NODE_ADMIN_VERSION)' docker-compose.yml
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
          HOPRD_VERSION: ${{ steps.setup.outputs.HOPRD_VERSION }}
          NODE_ADMIN_VERSION: ${{ steps.setup.outputs.NODE_ADMIN_VERSION }}
      - name: Install dependencies
        run: |
          npm install
      - name: Build
        run: |
          npx @dappnode/dappnodesdk build \
            --provider "remote" \
            --verbose | tee build.log
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GH_RUNNER_TOKEN }}
          commit-message: "ci: Update docker images"
          title: "ci: Update docker images"
          body: "This pull request updates the docker images to:\n- hoprd: ${{ steps.setup.outputs.HOPRD_VERSION }}\n- hopr-admin: ${{ steps.setup.outputs.NODE_ADMIN_VERSION }}\n\nThis PR was automatically generated by the bump workflow."
          branch: bot/update-${{ github.run_id}}
          delete-branch: true
          assignees: ${{ github.actor }}
          reviewers: "ausias-armesto,tolbrino,NumberFour8,Teebor-Choka,QYuQianchen,jeandemeusy,majchrzamemil,Jaguaras,mjadach-iv"
